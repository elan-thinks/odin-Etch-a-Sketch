<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>🎨 Etch-a-Sketch</title>
</head>
<body>
    <div class="wrapper">
        <div class="welcome">
            <img src="./images/etch.png">
            <h1>🎨 Etch-a-Sketch</h1>
        </div>
        <div class="container hidden">
            <div class="functionsDiv">
                <!-- <button id="build">Grid</button> -->
                <!-- <input id="getGridNumbers" type="number"> -->
                <input type="color" id="changeColor">
                <img id="eraseIcon" src="./images/eraser.png">
                <img src="./images/opacity.png" id="opacityIcon">
                <img  id="mixedColor" src="./images/mixColor.png">
            </div>
            <!-- <button id="download">📷 Download</button> -->
            <img src="./images/camera.png" id="download" alt="">

            <div class="grids">
            </div>
            <div class="decorate">
                <button>👏</button>
                
                <input id="resolution" type="range" min="40" max="100" step="1">
                <span id="showresolution"></span>
                <button>👏</button>
             </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</body>
</html>
